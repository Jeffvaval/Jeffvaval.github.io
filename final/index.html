<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime World</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
}

header {
    background: #1f1f1f;
    padding: 20px;
    text-align: center;
    border-bottom: 3px solid crimson;
}

h1 {
    margin: 0;
    color: crimson;
}

nav {
    text-align: center;
    margin: 20px;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: crimson;
}

section {
    padding: 20px;
    text-align: center;
}

.card {
    background: #1e1e1e;
    padding: 15px;
    margin: 15px;
    border-radius: 10px;
    display: inline-block;
    width: 250px;
}

</style>
</head>

<body>

<header>
    <h1>Anime World</h1>
    <p>Your beginner guide to anime</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Top 10</a>
    <a href="#">Genres</a>
</nav>

<section>
    <h2>Popular Anime</h2>

    <div class="card">
        <h3>Attack on Titan</h3>
        <p>Humanity vs Titans in a dark world.</p>
    </div>

    <div class="card">
        <h3>Naruto</h3>
        <p>A ninja striving to become Hokage.</p>
    </div>

    <div class="card">
        <h3>Your Lie in April</h3>
        <p>A beautiful story of music and love.</p>
    </div>
    <button onclick="showMessage()">Click Me</button>
    <p id="message"></p>

</section>
<script>
function showMessage() {
    document.getElementById("message").innerHTML = "Anime is awesome!";
}
</script>
</body>
</html>
