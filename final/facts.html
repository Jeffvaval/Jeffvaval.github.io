<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anime World - Facts</title>

<link rel="stylesheet" href="styles.css">    

<style>
body { margin: 0; font-family: Arial, sans-serif; background: #121212; color: white; }

header { background: #1f1f1f; padding: 20px; text-align: center; border-bottom: 3px solid crimson; }

h1 { color: crimson; margin: 0; }

nav { text-align: center; margin: 20px; }

nav a { color: white; margin: 8px; text-decoration: none; font-weight: bold; }

nav a:hover { color: crimson; }

section { padding: 20px; text-align: center; }

  


.hero {
    background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
    url("naruto.jpg");
    background-size: cover;
    background-position: center;
    padding: 80px 20px;
    text-align: center;
}


.fact-box {
    background: #1e1e1e;
    padding: 20px;
    margin: 30px auto;
    border-radius: 12px;
    max-width: 500px;
    transition: 0.3s;
}

.fact-box:hover {
    box-shadow: 0 0 15px crimson;
}

/* BUTTON */
button {
    padding: 10px 20px;
    background: crimson;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: darkred;
}
</style>
</head>

<body>

<header>
    <h1>Anime Facts</h1>
    <p>Click the button to learn something new</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="top10.html">Top 10</a>
    <a href="genres.html">Genres</a>
    <a href="facts.html">Facts</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<!-- HERO -->
<div class="hero">
    <h2>Anime Facts</h2>
    <p>Discover cool facts about anime</p>
</div>

<section>

    <div class="fact-box">
        <h2>Random Anime Fact</h2>
        <p id="fact">Click the button to see a fact!</p>
        <button onclick="showFact()">Get Random Anime Fact 🎲</button>
    </div>

</section>

<script>
function showFact() {
    var facts = [
        "Anime is a style of animation that originated in Japan.",
        "Many anime series are based on manga (Japanese comics).",
        "Naruto is one of the most popular anime worldwide.",
        "Anime can include many genres like action, romance, horror, and comedy.",
        "Studio Ghibli created famous anime movies like Spirited Away.",
        "Some anime are made for kids, while others are made for adults.",
        "Attack on Titan became one of the most popular anime of the 2010s.",
        "Voice actors in anime are called 'seiyuu' in Japan.",
        "One Piece is one of the longest-running anime series ever.",
        "Anime openings and endings often become very popular songs.",
        "Some anime are based on real locations in Japan.",
        "Dragon Ball helped popularize anime around the world.",
        "Anime conventions are held worldwide where fans cosplay as characters.",
        "Many anime movies are shown in theaters just like regular films.",
        "Streaming services like Crunchyroll and Netflix helped anime grow globally."
    ];

    var random = Math.floor(Math.random() * facts.length);
    document.getElementById("fact").innerHTML = facts[random];
}
</script>

</body>
</html>
